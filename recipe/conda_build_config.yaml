mkl:
  - 2025
# Default: on osx-arm64 — only openmpi; others — nompi/mpich
mpi:
  - openmpi                # [osx and arm64]
  - nompi                  # [not (osx and arm64)]
  - mpich                  # [not (osx and arm64) and not win]

c_compiler:
  - clang                  # [osx]
cxx_compiler:
  - clangxx                # [osx]
fortran_compiler:
  - gfortran               # [osx]

c_compiler_version:
  - 20.1.8                 # [osx]
cxx_compiler_version:
  - 20.1.8                 # [osx]
fortran_compiler_version:
  - 14.3.0                 # [osx]