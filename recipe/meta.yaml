# Why 'openblas' in host but 'libopenblas' in run?
# - host: we need headers + cmake/pkg-config metadata + the DSO for linking → 'openblas'.
# - run: conda-build inspects actual DSOs (libopenblas.*), so the package that ships them must be listed → 'libopenblas'.
#
# If you ever get "undefined reference to expf@GLIBC_2.27", "logf@GLIBC_2.27", or similar errors on Linux:
#   it means the OpenBLAS build you’re using was linked against a newer version of glibc (>= 2.27)
#   than the one used by your current build environment.
# To fix this, pin OpenBLAS to an older build from the 'defaults' channel that is compatible with your glibc version.

{% set version = "3.9.1" %}
{% set name = "arpack" %}
{% set build = 0 %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/opencollab/{{ name }}-ng/archive/{{ version }}.tar.gz
  sha256: f6641deb07fa69165b7815de9008af3ea47eb39b2bb97521fbf74c97aba6e844

build:
  number: {{ build }}
  # Windows: mkl + openblas, nompi only. Unix: openblas (+ mkl on x86/x86_64 linux), nompi/mpich.
  # osx-arm64 also uses openblas + openmpi in addition to nompi and mpich.

  # Per https://conda-forge.org/docs/maintainer/knowledge_base.html#preferring-a-provider-usually-nompi
  # add build string so packages can depend on
  # mpi or nompi variants explicitly:
  
  {% if mpi != 'nompi' %}
  {% set mpi_prefix = "mpi_" + mpi %}
  {% else %}
  {% set mpi_prefix = "nompi" %}
  {% endif %}
  string: "{{ mpi_prefix }}_h{{ PKG_HASH }}_{{ build }}"
  run_exports:
    - {{ pin_subpackage('arpack', max_pin='x.x') }} {{ mpi_prefix }}_*
  script_env:
   - DMPI=ON  # [mpi != 'nompi']
   - DMPI=OFF  # [mpi == 'nompi']

requirements:
  build:
    - cmake >=3.5,<4.0
    - make  # [unix]
    - ninja  # [win]
    - {{ stdlib('c') }}
    - {{ compiler('fortran') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - llvm-openmp  # [osx and not (blas_impl == "mkl")]
  host:
    # MPI/OpenMP
    - openmpi ==5.0.8        # [mpi == 'openmpi']
    # MPI (Fortran wrappers are required on macOS so CMake can find MPI Fortran components).
    - openmpi-mpifort        # [osx and mpi == 'openmpi']
    - {{ mpi }}              # [mpi == 'mpich']
    - intel-openmp   {{ mkl }}  # [blas_impl == "mkl"]
    # OpenBLAS or MKL
    - mkl-devel {{ mkl }}.*  # [blas_impl == "mkl"]
    - mkl {{ mkl }}.*  # [blas_impl == "mkl"]
    # OpenBLAS provider for OpenBLAS builds.
    # IMPORTANT: use 'openblas' in host so headers + CMake config are available.
    - openblas {{ openblas }}  # [blas_impl == "openblas"]
  run:
    # MPI/OpenMP
    - openmpi   # [mpi == 'openmpi']
    - {{ mpi }}              # [mpi == 'mpich']
    - {{ pin_compatible('intel-openmp') }}  # [blas_impl == "mkl"]
    # OpenBLAS or MKL
    - mkl {{ mkl }}.*  # [blas_impl == "mkl"]
    # OpenBLAS runtime:
    # IMPORTANT: runtime must contain the DSO provider ('libopenblas'), not the meta/devel pkg.
    # This fixes conda-build --error-overlinking by matching actual ELF/DSO needs.
    - libopenblas   # [blas_impl == "openblas"]
    - libgfortran5  # [linux]

test:
  commands:
    - test -f ${PREFIX}/lib/libarpack.a  # [unix]
    - test -f ${PREFIX}/lib/libarpack${SHLIB_EXT}  # [unix]
    - test -f ${PREFIX}/include/arpack/arpack.hpp  # [unix]
    - if not exist %LIBRARY_LIB%\\arpack.lib exit 1  # [win]
    - if not exist %LIBRARY_BIN%\\arpack.dll exit 1  # [win]
    - if not exist %LIBRARY_INC%\\arpack\\arpack.hpp exit 1  # [win]

about:
  home: https://github.com/opencollab/arpack-ng
  license: BSD-3-Clause
  license_family: BSD
  license_file: COPYING
  summary: Fortran77 subroutines designed to solve large scale eigenvalue problems
  description: |
    ARPACK (ARnoldi PACKage) is a software library for solving large-scale eigenvalue 
    problems, particularly those arising from sparse matrices. It provides efficient 
    algorithms for computing a few eigenvalues and corresponding eigenvectors of a 
    large, sparse, and possibly non-Hermitian matrix. ARPACK offers a range of methods, 
    including the Arnoldi iteration, Lanczos iteration, and implicitly restarted Arnoldi
    method, to approximate eigenvalues and eigenvectors.
  doc_url: https://github.com/opencollab/arpack-ng/tree/master/DOCUMENTS
  dev_url: https://github.com/opencollab/arpack-ng

extra:
  skip-lints:
    - host_section_needs_exact_pinnings
  recipe-maintainers:
    - jschueller
    - mrakitin
